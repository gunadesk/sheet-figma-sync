<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Zoho Auth — Connecting...</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f9f9f9; }
    .box { text-align: center; padding: 32px 40px; background: #fff; border-radius: 12px; box-shadow: 0 2px 16px rgba(0,0,0,0.08); max-width: 380px; }
    .icon { font-size: 48px; margin-bottom: 12px; }
    h2 { margin: 0 0 8px; font-size: 18px; }
    p  { margin: 0; color: #666; font-size: 14px; line-height: 1.6; }
    .error { color: #c0392b; }
    .success { color: #2e7d32; font-weight: 600; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon" id="icon">⏳</div>
    <h2 id="title">Connecting to Zoho…</h2>
    <p id="msg">Completing sign-in, please wait.</p>
  </div>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const code   = params.get("code");
      const error  = params.get("error");
      const icon  = document.getElementById("icon");
      const title = document.getElementById("title");
      const msg   = document.getElementById("msg");

      if (error) {
        icon.textContent  = "❌";
        title.textContent = "Authorization Failed";
        msg.textContent   = error + (params.get("error_description") ? ": " + params.get("error_description") : "");
        return;
      }
      if (!code) {
        icon.textContent  = "⚠️";
        title.textContent = "No code received";
        msg.textContent   = "Zoho did not return an authorization code. Please close this and try again.";
        return;
      }
      try {
        localStorage.setItem("zoho_oauth_code", JSON.stringify({ code: code, ts: Date.now() }));
        icon.textContent  = "✅";
        title.textContent = "Connected!";
        msg.innerHTML     = '<span class="success">Sign-in successful.</span><br>Return to Figma — the plugin will continue automatically.';
      } catch (e) {
        icon.textContent  = "❌";
        title.textContent = "Storage error";
        msg.textContent   = "Could not save auth code: " + e.message;
      }
    })();
  </script>
</body>
</html>
